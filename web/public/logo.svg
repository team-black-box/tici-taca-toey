<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Tici Taca Toey mark. Scalable source for site and portfolio use;
       logo-512.png is the raster export. Keep in sync with favicon.svg
       and web/src/common/logo.tsx. -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a140a"/>
  <rect x="12" y="12" width="488" height="488" rx="86" fill="none" stroke="#1e3320" stroke-width="16"/>
  <g transform="translate(76,76) scale(5.625)" >
    <g stroke="#00ff66" stroke-width="2.5" filter="url(#glow)">
      <line x1="25" y1="10" x2="25" y2="54"/><line x1="41" y1="10" x2="41" y2="54"/>
      <line x1="9" y1="25" x2="55" y2="25"/><line x1="9" y1="41" x2="55" y2="41"/>
    </g>
    <g filter="url(#glow)">
      <path d="M12 12 L21 21 M21 12 L12 21" stroke="#00ff66" stroke-width="3" stroke-linecap="round"/>
      <circle cx="33" cy="33" r="5" fill="none" stroke="#00d2ff" stroke-width="3"/>
    </g>
    <rect x="45" y="46" width="7" height="3.5" fill="#00ff66"/>
  </g>
</svg>
