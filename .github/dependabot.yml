# Security updates only.
#
# `open-pull-requests-limit: 0` switches off *version* updates for an
# ecosystem - the routine "bump X from 1.2 to 1.3" pull requests - without
# touching security updates, which Dependabot still opens whenever an
# advisory affects something we depend on. That is the trade this project
# wants: the dependency surface is deliberately tiny (the server has zero
# runtime dependencies, the web app has two), so routine churn costs more
# attention than it returns, while a real advisory should still shout.
#
# The ecosystems stay listed so Dependabot keeps scanning each manifest.
# To bring routine updates back for one, raise its limit.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/sdk"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  # iOS build tooling (CocoaPods / Fastlane) - not shipped in the app, but
  # advisories here should still surface.
  - package-ecosystem: "bundler"
    directory: "/mobile"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
